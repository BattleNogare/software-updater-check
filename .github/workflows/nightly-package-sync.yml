name: Software Update Manager - Nightly Package Sync

on:
  workflow_dispatch:

  schedule:
    # 01:15 UTC = ca. 02:15 Winterzeit / 03:15 Sommerzeit in Deutschland
    - cron: "15 1 * * *"

permissions:
  contents: read

concurrency:
  group: nightly-package-sync
  cancel-in-progress: false

jobs:
  enqueue-nightly-sync:
    name: Enqueue local checks for all active packages
    runs-on: ubuntu-latest

    steps:
      - name: Enqueue nightly package syncs
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          echo "Starte nächtlichen Paket-Sync."
          echo "Supabase URL: ${SUPABASE_URL}"

          response_file="$(mktemp)"

          status_code="$(
            curl -sS \
              -X POST "${SUPABASE_URL}/rest/v1/rpc/enqueue_nightly_package_syncs" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -o "$response_file" \
              -w "%{http_code}" \
              --data '{}'
          )"

          echo "HTTP status: ${status_code}"
          cat "$response_file"
          echo

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Nächtlicher Sync konnte nicht eingereiht werden."
            rm -f "$response_file"
            exit 1
          fi

          rm -f "$response_file"

          echo "Nächtlicher Paket-Sync wurde erfolgreich eingereiht."
