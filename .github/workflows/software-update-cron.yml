name: Process Existing Update Jobs

on:
  workflow_dispatch:
    inputs:
      process_limit:
        description: "Wie viele Jobs pro Function-Aufruf verarbeitet werden sollen"
        required: false
        default: "25"
      max_rounds:
        description: "Maximale Anzahl Function-Aufrufe pro Workflow-Lauf"
        required: false
        default: "20"

  schedule:
    # Alle 15 Minuten vorhandene queued Jobs abarbeiten
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: process-existing-update-jobs
  cancel-in-progress: false

env:
  FUNCTIONS_BASE_URL: "https://jgzuuanvrcmgbwtbnmrj.functions.supabase.co"
  PROCESS_LIMIT: ${{ github.event.inputs.process_limit || '25' }}
  MAX_ROUNDS: ${{ github.event.inputs.max_rounds || '20' }}

jobs:
  process-existing-jobs:
    name: Process queued jobs until empty
    runs-on: ubuntu-latest

    steps:
      - name: Process queued check_jobs
        shell: bash
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PROCESS_CHECK_JOBS_SECRET: ${{ secrets.PROCESS_CHECK_JOBS_SECRET }}
        run: |
          set -euo pipefail

          echo "Starting queued job processing"
          echo "Process limit per call: ${PROCESS_LIMIT}"
          echo "Max rounds: ${MAX_ROUNDS}"

          round=1
          total_processed=0

          while [ "$round" -le "$MAX_ROUNDS" ]; do
            echo "----------------------------------------"
            echo "Round ${round}/${MAX_ROUNDS}"

            response_file="$(mktemp)"

            status_code="$(
              curl -sS \
                -X POST "${FUNCTIONS_BASE_URL}/process-check-jobs" \
                -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
                -H "apikey: $SUPABASE_ANON_KEY" \
                -H "Content-Type: application/json" \
                -H "x-process-secret: $PROCESS_CHECK_JOBS_SECRET" \
                --data-binary "{\"limit\":${PROCESS_LIMIT}}" \
                -o "$response_file" \
                -w "%{http_code}"
            )"

            echo "HTTP status: ${status_code}"
            cat "$response_file"
            echo

            if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
              echo "process-check-jobs failed"
              exit 1
            fi

            processed="$(
              python3 - "$response_file" <<'PY'
import json
import sys

with open(sys.argv[1], "r", encoding="utf-8") as f:
    data = json.load(f)

print(int(data.get("processed", 0)))
PY
            )"

            echo "Processed in round ${round}: ${processed}"

            total_processed=$((total_processed + processed))

            rm -f "$response_file"

            if [ "$processed" -eq 0 ]; then
              echo "No more queued jobs found."
              break
            fi

            round=$((round + 1))
          done

          echo "----------------------------------------"
          echo "Total processed jobs: ${total_processed}"

          if [ "$round" -gt "$MAX_ROUNDS" ]; then
            echo "Reached max rounds. There may still be queued jobs left."
          fi
